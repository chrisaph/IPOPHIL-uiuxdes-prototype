<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPOPHL Prototype</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>IPOPHL System</h1>
  <nav>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('search')">Search</button>
    <button onclick="showSection('form')">Apply Trademark</button>
    <button onclick="showSection('payment')">Payment</button>
  </nav>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="active">
  <h2>Dashboard</h2>
  <div class="card">
    <h3>Draft Applications</h3>
    <p id="draftStatus">No drafts</p>
    <button onclick="loadDraft()">Resume Application</button>
  </div>

  <div class="card">
    <h3>Pending Payments</h3>
    <p id="paymentStatus">No pending payments</p>
    <button onclick="showSection('payment')">Resume Payment</button>
  </div>
</section>

<!-- SEARCH -->
<section id="search">
  <h2>Search Trademark</h2>

  <input type="text" id="searchInput" placeholder="Search...">

  <div class="filters">
    <select id="statusFilter">
      <option value="">Status</option>
      <option>Pending</option>
      <option>Approved</option>
    </select>

    <select id="typeFilter">
      <option value="">Type</option>
      <option>Word</option>
      <option>Logo</option>
    </select>
  </div>

  <button onclick="searchData()">Search</button>

  <ul id="results"></ul>
</section>

<!-- FORM -->
<section id="form">
  <h2>Trademark Application</h2>

  <form id="appForm">
    <label>Name</label>
    <input type="text" id="name">

    <label>Trademark Type</label>
    <select id="type">
      <option>Word</option>
      <option>Logo</option>
    </select>

    <label>Description</label>
    <textarea id="desc"></textarea>

    <p id="autosaveStatus">Not saved</p>

    <button type="button" onclick="saveDraft()">Save Draft</button>
    <button type="button" onclick="showSection('payment')">Proceed to Payment</button>
  </form>
</section>

<!-- PAYMENT -->
<section id="payment">
  <h2>Payment</h2>

  <select id="paymentMethod">
    <option>Credit Card</option>
    <option>GCash</option>
  </select>

  <button onclick="payNow()">Pay Now</button>
  <button onclick="savePayment()">Save & Pay Later</button>

  <p id="paymentMessage"></p>
</section>

<script src="js/script.js"></script>
</body>
</html>
